# Demo instance — isolated from the main instance
#
# Usage:
#   cp .env.demo.example .env.demo
#   # Fill in DEMO_POSTGRES_PASSWORD and DEMO_NEXTAUTH_SECRET
#
#   # Start (uses pre-built GHCR images, or builds from source on first run):
#   docker compose -f docker-compose.demo.yml --env-file .env.demo up -d
#
#   # Seed demo data (run once after first boot):
#   docker compose -f docker-compose.demo.yml --env-file .env.demo exec app-demo tsx prisma/seed-demo.ts
#
#   # Force rebuild from source:
#   docker compose -f docker-compose.demo.yml --env-file .env.demo up -d --build
#
# Only port DEMO_PORT (default 3003) is exposed. The sync service (8000)
# and database are internal to the Docker network.

services:
  db-demo:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: demo
      POSTGRES_PASSWORD: ${DEMO_POSTGRES_PASSWORD:?DEMO_POSTGRES_PASSWORD is required}
      POSTGRES_DB: finalibaba_demo
    volumes:
      - demo_postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U demo -d finalibaba_demo"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  app-demo:
    image: ghcr.io/loicserre/finalibaba-selfhosted/app:latest
    build: .
    environment:
      DATABASE_URL: postgresql://demo:${DEMO_POSTGRES_PASSWORD}@db-demo:5432/finalibaba_demo
      NODE_ENV: production
      NEXTAUTH_SECRET: ${DEMO_NEXTAUTH_SECRET:?DEMO_NEXTAUTH_SECRET is required}
      NEXTAUTH_URL: ${DEMO_URL:-http://localhost:3003}
      AUTH_ENABLED: "false"
      DEMO_MODE: "true"
      SYNC_SERVICE_URL: http://sync-demo:8000
    ports:
      - "${DEMO_PORT:-3003}:3000"
    depends_on:
      db-demo:
        condition: service_healthy
    restart: unless-stopped

  sync-demo:
    image: ghcr.io/loicserre/finalibaba-selfhosted/sync:latest
    build: ./sync
    environment:
      DATABASE_URL: postgresql://demo:${DEMO_POSTGRES_PASSWORD}@db-demo:5432/finalibaba_demo
      # No sync credentials — demo data is seeded only, no live sync
    volumes:
      - demo_woob:/root/.config/woob
      - demo_pytr:/root/.pytr
    depends_on:
      db-demo:
        condition: service_healthy
    restart: unless-stopped

volumes:
  demo_postgres:
  demo_woob:
  demo_pytr:
